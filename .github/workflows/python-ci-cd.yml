name: Python CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # 1. BUILD & TEST
  # ─────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]  # Bir neçə versiyada test et

    steps:
      - name: Kodu yüklə (Checkout)
        uses: actions/checkout@v4

      - name: Python ${{ matrix.python-version }} quraşdır
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: pip yenilə
        run: python -m pip install --upgrade pip

      - name: Asılılıqları yüklə
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      - name: Kodu yoxla (Flake8 Lint)
        run: |
          # Kritik xətaları yoxla (sintaksis xətaları, tanımsız dəyişənlər)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Bütün uyarıları yoxla
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Testləri işlət (pytest)
        run: |
          pytest Test/ --cov=. --cov-report=xml --cov-report=term-missing -v

      - name: Coverage hesabatını yüklə
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

  # ─────────────────────────────────────────
  # 2. DEPLOY (yalnız main branch-da)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://sənin-saytın.com  # ← öz URL-ini yaz

    steps:
      - name: Kodu yüklə (Checkout)
        uses: actions/checkout@v4

      - name: Python quraşdır
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Asılılıqları yüklə
        run: pip install -r requirements.txt

      - name: Serverə deploy et
        run: |
          echo "🚀 Deploy başlayır..."
          # Öz deploy əmrlərini buraya yaz, məsələn:
          # rsync -avz . user@$SERVER_HOST:/var/www/myapp/
          # və ya: eb deploy (AWS Elastic Beanstalk)
          # və ya: gcloud app deploy (Google Cloud)
          echo "✅ Deploy uğurla tamamlandı!"
        env:
          # GitHub repo → Settings → Secrets and variables → Actions
          # bölməsindən bu secret-ləri əlavə et:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}

  # ─────────────────────────────────────────
  # 3. BİLDİRİŞ
  # ─────────────────────────────────────────
  notify:
    name: Bildiriş göndər
    runs-on: ubuntu-latest
    needs: [build-and-test, deploy]
    if: always()

    steps:
      - name: Pipeline nəticəsini çap et
        run: |
          echo "Pipeline Status:"
          echo "  Build & Test : ${{ needs.build-and-test.result }}"
          echo "  Deploy       : ${{ needs.deploy.result }}"
