name: Python CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────
  # 1. BUILD & LINT
  # ─────────────────────────────────────────
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with Flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv,.venv,__pycache__
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=venv,.venv,__pycache__

      - name: Run app
        run: python app.py

  # ─────────────────────────────────────────
  # 2. DEPLOY (only on main branch)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://your-site.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Deploy to server
        run: |
          echo "Deploy starting..."
          echo "Deploy completed successfully!"
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}

  # ─────────────────────────────────────────
  # 3. NOTIFY
  # ─────────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build-and-lint, deploy]
    if: always()

    steps:
      - name: Print pipeline status
        run: |
          echo "Pipeline Status:"
          echo "  Build & Lint : ${{ needs.build-and-lint.result }}"
          echo "  Deploy       : ${{ needs.deploy.result }}"